<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VetNova Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href=".css/VETNOVA.CSS">
<link rel="stylesheet" href=".css/login.css">

</head>
<body>

<!-- Navbar -->
<div id="navbar-placeholder"></div>

<!-- Login Section -->
<section class="login-page">

    <div class="login-card">

        <div class="logo">
            <i class="fas fa-paw"></i>
            <span>VetNova</span>
        </div>

        <h1>Welcome to VetNova</h1>

        <p class="subtitle">
            Please enter your credentials to manage your pet's care.
        </p>

 <form id="loginForm" autocomplete="off">

            <div class="input-group">
                <i class="far fa-user"></i>
                <input type="email" placeholder="Email Address" autocomplete="off" required>
            </div>

          <div class="input-group">

    <i class="fas fa-lock lock-icon"></i>

    <input
    type="password"
    id="password"
    placeholder="Password"
    autocomplete="new-password"
    required>

    <i class="fas fa-eye eye-icon" id="togglePassword"></i>

</div>
            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <div class="divider">
            <span>Or login with</span>
        </div>

        <div class="socials">

            <a href="#" class="social-btn">
                <i class="fab fa-google"></i>
            </a>

            <a href="#" class="social-btn">
                <i class="fab fa-facebook-f"></i>
            </a>

        </div>

       <div class="signup">
    Don't have an account?
    <a href="signup.html">Sign Up</a>
</div>
    </div>

</section>

<!-- Footer -->
<div id="footer-placeholder"></div>

<script src="\\.js/VETNOVA.JS"></script>

<script src=".js/login.js"></script>

</body>
</html>
